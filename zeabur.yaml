# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Tool Gateway
spec:
  description: DeepSeek Web 对话转 OpenAI/Claude/Gemini 兼容 API（Go 实现，含 WebUI）
  tags:
    - DeepSeek
    - API
    - Go
  readme: |-
    # Tool Gateway (Zeabur)

    ## Runtime baseline
    - Go: 1.26

    ## After deployment
    - Admin panel: `/admin`
    - Health check: `/healthz`
    - Config is persisted at `/data/config.json` (mounted volume)
    - `BUILD_VERSION` is optional; when omitted, Docker build falls back to the repo `VERSION` file automatically

    ## First-time setup
    1. Open your service URL, then visit `/admin`
    2. Login with `TOOL_GATEWAY_ADMIN_KEY` (shown in Zeabur env/instructions)
    3. Import / edit config in Admin UI (saved to `/data/config.json`)
    4. On a fresh volume, Tool Gateway starts with an empty config and creates `/data/config.json` on the first save

  services:
    - name: tool-gateway
      template: GIT
      spec:
        source:
          source: GITHUB
          repo: 1139136822
          branch: main
          rootDirectory: /
        ports:
          - id: web
            port: 5001
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          PORT:
            default: "5001"
          LOG_LEVEL:
            default: "INFO"
          TOOL_GATEWAY_ADMIN_KEY:
            default: ${PASSWORD}
            expose: true
          TOOL_GATEWAY_CONFIG_PATH:
            default: /data/config.json
        instructions:
          - title: Admin panel
            content: Visit `/admin` on your service URL.
          - title: Tool Gateway admin key
            content: ${TOOL_GATEWAY_ADMIN_KEY}
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /healthz
