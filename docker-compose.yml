services:
  tool-gateway:
    image: ghcr.io/cjackhwang/tool-gateway:latest
    container_name: tool-gateway
    restart: always
    env_file:
      - .env
    ports:
      # Host port is configurable via TOOL_GATEWAY_HOST_PORT; container port stays fixed at 5001.
      - "${TOOL_GATEWAY_HOST_PORT:-6011}:5001"
    volumes:
      - ./config.json:/data/config.json   # 配置文件（持久化推荐路径）
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - TOOL_GATEWAY_ADMIN_KEY=${TOOL_GATEWAY_ADMIN_KEY:-tool-gateway}
      - TOOL_GATEWAY_CONFIG_PATH=/data/config.json
